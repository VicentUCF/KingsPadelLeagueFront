<app-modal-shell
  [description]="
    mode() === 'create'
      ? 'La ficha define el perfil base del jugador y su equipo actual derivado.'
      : 'Actualiza la ficha del jugador sin tocar participaciones ni nominaciones históricas.'
  "
  [isOpen]="isOpen()"
  [title]="mode() === 'create' ? 'Crear ficha' : 'Editar ficha'"
  size="wide"
  (closed)="close()"
>
  <div modalBody class="player-form-dialog__body">
    <div class="player-form-dialog__steps" aria-label="Progreso del formulario">
      <div
        [class.player-form-dialog__step--active]="isCurrentStep(0)"
        class="player-form-dialog__step"
      >
        <span>1</span>
        <strong>Identidad</strong>
      </div>

      <div
        [class.player-form-dialog__step--active]="isCurrentStep(1)"
        class="player-form-dialog__step"
      >
        <span>2</span>
        <strong>Perfil</strong>
      </div>
    </div>

    @if (submissionError()) {
      <p class="player-form-dialog__error" role="alert">{{ submissionError() }}</p>
    }

    <form
      [formGroup]="form"
      class="player-form-dialog__form"
      id="player-form"
      (ngSubmit)="submit()"
    >
      @switch (currentStep()) {
        @case (0) {
          <div class="player-form-dialog__grid">
            <app-base-input
              formControlName="fullName"
              label="Nombre completo"
              [errorMessage]="
                hasControlError('fullName') ? 'El nombre completo es obligatorio.' : null
              "
              required
              type="text"
            />

            <app-base-input
              formControlName="nickName"
              label="Nick"
              [errorMessage]="hasControlError('nickName') ? 'El nick es obligatorio.' : null"
              required
              type="text"
            />

            <app-base-input
              class="player-form-dialog__field--full"
              formControlName="avatarPath"
              helperText="Ruta opcional de imagen. Si se deja vacía, se mostrará un fallback textual."
              label="Avatar"
              type="text"
            />
          </div>
        }
        @case (1) {
          <div class="player-form-dialog__grid">
            <app-base-select formControlName="preferredSideLabel" label="Perfil de pista">
              <option value="Revés">Revés</option>
              <option value="Derecha">Derecha</option>
              <option value="Ambas">Ambas</option>
            </app-base-select>

            <app-base-select formControlName="currentTeamId" label="Equipo actual">
              <option value="">Sin equipo activo</option>
              @for (team of teamOptions(); track team.id) {
                <option [value]="team.id">{{ team.label }}</option>
              }
            </app-base-select>

            <app-base-input
              formControlName="linkedUserEmail"
              label="Email vinculado"
              [errorMessage]="
                hasControlError('linkedUserEmail')
                  ? 'Introduce un email válido o deja el campo vacío.'
                  : null
              "
              type="email"
            />

            <app-base-select formControlName="status" label="Estado">
              <option value="ACTIVE">Activo</option>
              <option value="INACTIVE">Inactivo</option>
            </app-base-select>
          </div>
        }
      }
    </form>
  </div>

  <div class="player-form-dialog__actions" modalFooter>
    <button
      class="player-form-dialog__button player-form-dialog__button--secondary"
      type="button"
      (click)="close()"
    >
      Cancelar
    </button>

    @if (!isFirstStep()) {
      <button
        class="player-form-dialog__button player-form-dialog__button--secondary"
        type="button"
        (click)="previousStep()"
      >
        Anterior
      </button>
    }

    @if (isFirstStep()) {
      <button
        class="player-form-dialog__button player-form-dialog__button--primary"
        type="button"
        (click)="nextStep()"
      >
        Siguiente
      </button>
    } @else {
      <button
        class="player-form-dialog__button player-form-dialog__button--primary"
        form="player-form"
        [disabled]="isSubmitting()"
        type="submit"
      >
        {{
          isSubmitting() ? 'Guardando...' : mode() === 'create' ? 'Crear ficha' : 'Guardar cambios'
        }}
      </button>
    }
  </div>
</app-modal-shell>
