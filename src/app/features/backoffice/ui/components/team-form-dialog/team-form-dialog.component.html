<app-modal-shell
  [description]="
    mode() === 'create'
      ? 'El nuevo equipo se asociará automáticamente a la season activa.'
      : 'Actualiza la identidad operativa del equipo sin tocar roster, roles ni fixtures.'
  "
  [isOpen]="isOpen()"
  [title]="mode() === 'create' ? 'Crear equipo' : 'Editar equipo'"
  size="wide"
  (closed)="close()"
>
  <div modalBody>
    <div class="team-form-dialog__steps" aria-label="Progreso del formulario">
      <div [class.team-form-dialog__step--active]="isCurrentStep(0)" class="team-form-dialog__step">
        <span>1</span>
        <strong>Identidad</strong>
      </div>

      <div [class.team-form-dialog__step--active]="isCurrentStep(1)" class="team-form-dialog__step">
        <span>2</span>
        <strong>Operación</strong>
      </div>
    </div>

    @if (submissionError()) {
      <p class="team-form-dialog__error" role="alert">{{ submissionError() }}</p>
    }

    <form [formGroup]="form" class="team-form-dialog__form" id="team-form" (ngSubmit)="submit()">
      @switch (currentStep()) {
        @case (0) {
          <div class="team-form-dialog__grid">
            <label class="team-form-dialog__field">
              <span>Nombre</span>
              <input formControlName="name" type="text" />
              @if (hasControlError('name')) {
                <small>El nombre del equipo es obligatorio.</small>
              }
            </label>

            <label class="team-form-dialog__field">
              <span>Siglas</span>
              <input formControlName="shortName" maxlength="5" type="text" />
              @if (hasControlError('shortName')) {
                <small>Usa entre 2 y 5 letras en mayúsculas.</small>
              }
            </label>
          </div>
        }
        @case (1) {
          <div class="team-form-dialog__grid">
            <label class="team-form-dialog__field">
              <span>Presidente</span>
              <input formControlName="presidentName" type="text" />
              @if (hasControlError('presidentName')) {
                <small>La presidencia actual es obligatoria.</small>
              }
            </label>

            <label class="team-form-dialog__field">
              <span>Color principal</span>
              <input formControlName="primaryColor" type="text" />
              @if (hasControlError('primaryColor')) {
                <small>Introduce un color hexadecimal válido.</small>
              }
            </label>

            <label class="team-form-dialog__field">
              <span>Color secundario</span>
              <input formControlName="secondaryColor" type="text" />
              @if (hasControlError('secondaryColor')) {
                <small>Introduce un color hexadecimal válido.</small>
              }
            </label>
          </div>
        }
      }
    </form>
  </div>

  <div class="team-form-dialog__actions" modalFooter>
    <button
      class="team-form-dialog__button team-form-dialog__button--secondary"
      type="button"
      (click)="close()"
    >
      Cancelar
    </button>

    @if (!isFirstStep()) {
      <button
        class="team-form-dialog__button team-form-dialog__button--secondary"
        type="button"
        (click)="previousStep()"
      >
        Anterior
      </button>
    }

    @if (isFirstStep()) {
      <button
        class="team-form-dialog__button team-form-dialog__button--primary"
        type="button"
        (click)="nextStep()"
      >
        Siguiente
      </button>
    } @else {
      <button
        class="team-form-dialog__button team-form-dialog__button--primary"
        form="team-form"
        [disabled]="isSubmitting()"
        type="submit"
      >
        {{
          isSubmitting() ? 'Guardando...' : mode() === 'create' ? 'Crear equipo' : 'Guardar cambios'
        }}
      </button>
    }
  </div>
</app-modal-shell>
