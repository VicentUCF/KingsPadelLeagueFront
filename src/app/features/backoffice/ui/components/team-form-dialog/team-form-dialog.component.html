<app-modal-shell
  [description]="
    mode() === 'create'
      ? 'El nuevo equipo se asociará automáticamente a la season activa.'
      : 'Actualiza la identidad operativa del equipo sin tocar roster, roles ni fixtures.'
  "
  [isOpen]="isOpen()"
  [title]="mode() === 'create' ? 'Crear equipo' : 'Editar equipo'"
  size="wide"
  (closed)="close()"
>
  <div modalBody class="team-form-dialog__body">
    <div class="team-form-dialog__steps" aria-label="Progreso del formulario">
      <div [class.team-form-dialog__step--active]="isCurrentStep(0)" class="team-form-dialog__step">
        <span>1</span>
        <strong>Identidad</strong>
      </div>

      <div [class.team-form-dialog__step--active]="isCurrentStep(1)" class="team-form-dialog__step">
        <span>2</span>
        <strong>Operación</strong>
      </div>
    </div>

    @if (submissionError()) {
      <p class="team-form-dialog__error" role="alert">{{ submissionError() }}</p>
    }

    <form [formGroup]="form" class="team-form-dialog__form" id="team-form" (ngSubmit)="submit()">
      @switch (currentStep()) {
        @case (0) {
          <div class="team-form-dialog__grid">
            <app-base-input
              formControlName="name"
              label="Nombre"
              [errorMessage]="
                hasControlError('name') ? 'El nombre del equipo es obligatorio.' : null
              "
              required
              type="text"
            />

            <app-base-input
              formControlName="shortName"
              label="Siglas"
              [errorMessage]="
                hasControlError('shortName') ? 'Usa entre 2 y 5 letras en mayúsculas.' : null
              "
              [maxLength]="5"
              required
              type="text"
            />
          </div>
        }
        @case (1) {
          <div class="team-form-dialog__grid">
            <app-base-input
              formControlName="presidentName"
              label="Presidente"
              [errorMessage]="
                hasControlError('presidentName') ? 'La presidencia actual es obligatoria.' : null
              "
              required
              type="text"
            />

            <app-base-input
              formControlName="primaryColor"
              helperText="Formato hexadecimal, por ejemplo #1B1F3B."
              label="Color principal"
              [errorMessage]="
                hasControlError('primaryColor') ? 'Introduce un color hexadecimal válido.' : null
              "
              required
              type="text"
            />

            <app-base-input
              formControlName="secondaryColor"
              helperText="Formato hexadecimal, por ejemplo #D4AF37."
              label="Color secundario"
              [errorMessage]="
                hasControlError('secondaryColor') ? 'Introduce un color hexadecimal válido.' : null
              "
              required
              type="text"
            />
          </div>
        }
      }
    </form>
  </div>

  <div class="team-form-dialog__actions" modalFooter>
    <button
      class="team-form-dialog__button team-form-dialog__button--secondary"
      type="button"
      (click)="close()"
    >
      Cancelar
    </button>

    @if (!isFirstStep()) {
      <button
        class="team-form-dialog__button team-form-dialog__button--secondary"
        type="button"
        (click)="previousStep()"
      >
        Anterior
      </button>
    }

    @if (isFirstStep()) {
      <button
        class="team-form-dialog__button team-form-dialog__button--primary"
        type="button"
        (click)="nextStep()"
      >
        Siguiente
      </button>
    } @else {
      <button
        class="team-form-dialog__button team-form-dialog__button--primary"
        form="team-form"
        [disabled]="isSubmitting()"
        type="submit"
      >
        {{
          isSubmitting() ? 'Guardando...' : mode() === 'create' ? 'Crear equipo' : 'Guardar cambios'
        }}
      </button>
    }
  </div>
</app-modal-shell>
