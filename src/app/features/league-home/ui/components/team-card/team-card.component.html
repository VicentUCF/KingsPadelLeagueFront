<a class="team-card__link c-surface-card" [routerLink]="team().teamLink">
  <div class="team-card__header">
    <span aria-hidden="true" class="team-card__badge">{{ team().monogram }}</span>
    <lucide-angular [img]="shieldIcon" [size]="16" aria-hidden="true" class="team-card__icon" />
  </div>

  <div class="team-card__body">
    <h3 class="team-card__title">{{ team().name }}</h3>
    <p class="team-card__president">Presidente: {{ team().presidentName }}</p>
    <p class="team-card__players">
      <lucide-angular [img]="usersIcon" [size]="15" aria-hidden="true" />
      <span>{{ team().playerCountLabel }}</span>
    </p>
  </div>

  <span class="team-card__cta">
    <span>Ver equipo</span>
    <lucide-angular [img]="arrowUpRightIcon" [size]="15" aria-hidden="true" />
  </span>
</a>
