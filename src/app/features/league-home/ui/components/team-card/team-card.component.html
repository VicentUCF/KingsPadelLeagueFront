<a
  [routerLink]="team().teamLink"
  [style.--team-accent]="team().palette.accent"
  [style.--team-glow]="team().palette.glow"
  [style.--team-primary]="team().palette.primary"
  [style.--team-surface]="team().palette.surface"
  class="team-card__link c-surface-card"
>
  <div class="team-card__media">
    <div aria-hidden="true" class="team-card__glow"></div>
    <span aria-hidden="true" class="team-card__badge">
      @if (team().logoPath) {
        <img
          [ngSrc]="team().logoPath!"
          alt=""
          class="team-card__badge-image"
          decoding="async"
          height="48"
          width="48"
        />
      } @else {
        <span class="team-card__badge-fallback">{{ team().monogram }}</span>
      }
    </span>
  </div>

  <div class="team-card__body">
    <div class="team-card__identity">
      <h3 class="team-card__title">{{ team().name }}</h3>
      <p class="team-card__president">Presidente: {{ team().presidentName }}</p>
    </div>

    <p class="team-card__players">
      <lucide-angular [img]="usersIcon" [size]="15" aria-hidden="true" />
      <span>{{ team().playerCountLabel }}</span>
    </p>
  </div>

  <span class="team-card__cta">
    <span>Ver equipo</span>
    <lucide-angular [img]="arrowUpRightIcon" [size]="15" aria-hidden="true" />
  </span>
</a>
